<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArTee Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --stone: #2a2016;
      --stone-mid: #3d3020;
      --stone-light: #5c4a2a;
      --wood: #8b6914;
      --wood-light: #c49a2a;
      --accent: #e8a020;
      --block-red:    #e05050;
      --block-blue:   #4a90d9;
      --block-green:  #5bbf5b;
      --block-yellow: #f0c030;
      --block-purple: #9b59b6;
      --block-teal:   #2eada8;
      --text: #f0e8d0;
      --text-dim: #a89070;
    }

    body {
      background-color: var(--stone);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(92,74,42,0.3) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(139,105,20,0.15) 0%, transparent 50%);
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    header {
      position: relative;
      z-index: 1;
      padding: 3rem 2rem 2rem;
      text-align: center;
      border-bottom: 2px solid var(--stone-light);
    }

    .studio-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 6rem);
      letter-spacing: 0.12em;
      color: var(--accent);
      text-shadow: 0 2px 20px rgba(232,160,32,0.4), 3px 3px 0 var(--stone-mid);
      line-height: 1;
    }

    .studio-sub {
      color: var(--text-dim);
      font-size: 0.9rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    /* Falling blocks animation */
    .blocks-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 2rem auto 0;
      padding: 0 1rem;
    }

    .block {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.35), inset 0 2px 0 rgba(255,255,255,0.2);
      animation: bob 2s ease-in-out infinite;
    }
    .block:nth-child(1) { background: var(--block-red);    animation-delay: 0s; }
    .block:nth-child(2) { background: var(--block-blue);   animation-delay: 0.15s; }
    .block:nth-child(3) { background: var(--block-green);  animation-delay: 0.30s; }
    .block:nth-child(4) { background: var(--block-yellow); animation-delay: 0.45s; }
    .block:nth-child(5) { background: var(--block-purple); animation-delay: 0.60s; }
    .block:nth-child(6) { background: var(--block-teal);   animation-delay: 0.75s; }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    /* Main content */
    main {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    .game-card {
      background: var(--stone-mid);
      border: 1px solid var(--stone-light);
      border-radius: 16px;
      padding: 2.5rem;
      display: flex;
      gap: 2rem;
      align-items: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      margin-bottom: 3rem;
    }

    .game-icon {
      flex-shrink: 0;
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, var(--block-blue), var(--block-purple));
      border-radius: 22px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .game-icon span {
      border-radius: 5px;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.3);
    }
    .game-icon span:nth-child(1) { background: var(--block-red); }
    .game-icon span:nth-child(2) { background: var(--block-yellow); }
    .game-icon span:nth-child(3) { background: var(--block-green); }
    .game-icon span:nth-child(4) { background: var(--block-teal); }

    .game-info h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 0.08em;
      color: var(--accent);
      line-height: 1;
    }

    .game-info p {
      color: var(--text-dim);
      margin-top: 0.6rem;
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .badge {
      display: inline-block;
      background: var(--stone-light);
      color: var(--wood-light);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      margin-top: 1rem;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.1em;
      color: var(--wood-light);
      margin-bottom: 1rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .links a::before { content: '▸'; color: var(--accent); }
    .links a:hover { color: var(--accent); }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      color: var(--text-dim);
      font-size: 0.8rem;
      border-top: 1px solid var(--stone-light);
    }

    @media (max-width: 520px) {
      .game-card { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

<header>
  <div class="studio-name">ArTee Games</div>
  <div class="studio-sub">Indie Mobile Games</div>
  <div class="blocks-row">
    <div class="block"></div>
    <div class="block"></div>
    <div class="block"></div>
    <div class="block"></div>
    <div class="block"></div>
    <div class="block"></div>
  </div>
</header>

<main>
  <div class="game-card">
    <div class="game-icon">
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="game-info">
      <h2>Tiltfall</h2>
      <p>A satisfying mobile puzzle game about dropping, merging, and chaining colorful blocks. Find your balance – or tip the scales!</p>
      <span class="badge">Coming Soon</span>
    </div>
  </div>

<div class="section-title">Tiltfall</div>
<div class="links">
  <a href="tiltfall.html">Help &amp; Game Guide</a>
</div>

<div class="section-title">Legal</div>
<div class="links">
  <a href="privacy.html">Privacy Policy – Tiltfall</a>
</div>
</main>

<footer>
  &copy; 2026 ArTee Games &nbsp;·&nbsp; All rights reserved
</footer>

</body>
</html>
